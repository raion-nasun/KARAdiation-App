services:
  - type: web
    name: karadiation-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # Render 대시보드에서 직접 입력
      - key: PORT
        value: 10000       # Render 기본 포트
      - key: FLASK_ENV
        value: production
