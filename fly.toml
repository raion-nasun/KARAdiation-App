app = "karadiation-app"
primary_region = "nrt"  # 도쿄 (한국과 가장 가까운 Fly.io 리전)

[build]

[env]
  FLASK_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "karadiation_data"
  destination = "/data"
